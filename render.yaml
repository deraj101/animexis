services:
  - type: web
    name: animexis-api
    env: node
    region: singapore   # closest to Philippines
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGO_URI
        sync: false   # you'll paste this from MongoDB Atlas
      - key: REDIS_URL
        sync: false   # you'll paste this from Upstash
      - key: JWT_SECRET
        sync: false   # paste your secret here
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: RATE_LIMIT_WINDOW
        value: 15
      - key: RATE_LIMIT_MAX
        value: 500
